packages:
  - "apps/*"
  - "bots/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  "@mongodb-js/zstd": true
  # postinstall is only a funding banner; we intentionally don't run it. Set
  # explicitly so CI doesn't fail on an unapproved ignored build script.
  core-js-pure: false
  esbuild: true
  node-liblzma: true
  protobufjs: true
  sharp: true
  workerd: true

onlyBuiltDependencies:
  - esbuild
  - workerd

catalogs:
  tooling:
    "@types/node": 24.13.2
    typescript: 7.0.1-rc

  testing:
    vitest: ^4.1.9

  flue:
    "@flue/runtime": 1.0.0-beta.2
    "@flue/github": 1.0.0-beta.1
    "@flue/slack": 1.0.0-beta.1

  cf:
    "@cloudflare/sandbox": ^0.12.1

  external:
    valibot: ^1.4.1
    "@octokit/rest": ^22.0.1
    "@slack/web-api": 8.0.0-rc.1

patchedDependencies:
  "@flue/runtime@1.0.0-beta.2": patches/@flue__runtime@1.0.0-beta.2.patch
