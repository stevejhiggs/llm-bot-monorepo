minimumReleaseAge: 0

packages:
  - "apps/*"
  - "bots/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  "@mongodb-js/zstd": true
  # postinstall is only a funding banner; we intentionally don't run it. Set
  # explicitly so CI doesn't fail on an unapproved ignored build script.
  core-js-pure: false
  esbuild: true
  node-liblzma: true
  protobufjs: true
  sharp: true
  workerd: true

onlyBuiltDependencies:
  - esbuild
  - workerd

catalogs:
  tooling:
    "@types/node": 24.13.2
    typescript: 7.0.1-rc

  testing:
    vitest: ^4.1.9
    "@testing-library/dom": ^10.4.1
    "@testing-library/react": ^16.3.2
    jsdom: ^29.1.1

  flue:
    "@flue/runtime": 1.0.0-beta.3
    # @flue/github and @flue/slack have no beta.2/beta.3 release yet — beta.1 is
    # their latest published version (the core @flue/* packages are at beta.3).
    "@flue/github": 1.0.0-beta.1
    "@flue/slack": 1.0.0-beta.1

  cf:
    "@cloudflare/sandbox": ^0.12.1

  external:
    valibot: ^1.4.1
    "@octokit/plugin-throttling": ^11.0.3
    "@octokit/rest": ^22.0.1
    "@slack/web-api": 8.0.0-rc.1

patchedDependencies:
  "@flue/cli@1.0.0-beta.3": patches/@flue__cli@1.0.0-beta.3.patch
