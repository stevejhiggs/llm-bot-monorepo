packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@google/genai": true
  "@mongodb-js/zstd": true
  # postinstall is only a funding banner; we intentionally don't run it. Set
  # explicitly so CI doesn't fail on an unapproved ignored build script.
  core-js-pure: false
  esbuild: true
  node-liblzma: true
  protobufjs: true
  sharp: true
  workerd: true

onlyBuiltDependencies:
  - esbuild
  - workerd

catalogs:
  tooling:
    "@types/node": 24.13.2
    typescript: 7.0.1-rc

  testing:
    vitest: ^4.1.9

patchedDependencies:
  "@flue/runtime@1.0.0-beta.2": patches/@flue__runtime@1.0.0-beta.2.patch
